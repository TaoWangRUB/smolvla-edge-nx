# smolvla-edge — one place for all container parameters (nvidia runtime, CUDA env,
# /workspace mount, HF cache). Style mirrors BEV_Jetson / ackermann_rover_humble.
#
# Works with both compose v2 (`docker compose ...`) and legacy v1 (`docker-compose ...`);
# the `version: "2.4"` key is required by v1 for `runtime: nvidia` and ignored by v2.
#
#   docker-compose build                  # build the smolvla-edge:sim image (once)
#   docker-compose run --rm verify        # pretrained ACT on transfer-cube (known-good baseline)
#   docker-compose run --rm eval          # eval: override via EVAL_ARGS="..."
#   docker-compose run --rm infer         # smoke-test smolvla_base on its SO-101 dataset
#   docker-compose run --rm train         # fine-tune (scripts/train.sh; needs a big GPU)
#   docker-compose run --rm bench         # latency benchmark (BENCH_ARGS="...")
#   docker-compose run --rm shell         # interactive shell
#
# The image runs mujoco 2.3.7 (matched to the ALOHA datasets/checkpoints); the host py3.12
# stack runs mujoco 3.x — expect better fine-manipulation numbers in here (see design.md).
version: "2.4"

x-smolvla: &smolvla
  image: smolvla-edge:sim
  build:
    context: .
    dockerfile: docker/Dockerfile
  runtime: nvidia
  working_dir: /workspace
  shm_size: 8g                # torch DataLoader workers need > default 64 MB
  stop_signal: SIGINT
  environment:
    NVIDIA_VISIBLE_DEVICES: all
    NVIDIA_DRIVER_CAPABILITIES: all   # compute + graphics (graphics is required for EGL)
    MUJOCO_GL: ${MUJOCO_GL:-egl}      # set MUJOCO_GL=osmesa if EGL is unavailable
    HF_TOKEN: ${HF_TOKEN:-}
    # Training knobs passed through to scripts/train.sh (empty -> its own defaults apply):
    #   BATCH_SIZE=4 STEPS=1000 docker compose run --rm train
    POLICY_PATH: ${POLICY_PATH:-}
    DATASET_REPO_ID: ${DATASET_REPO_ID:-}
    BATCH_SIZE: ${BATCH_SIZE:-}
    STEPS: ${STEPS:-}
    SAVE_FREQ: ${SAVE_FREQ:-}
    OUTPUT_DIR: ${OUTPUT_DIR:-}
  volumes:
    - ./:/workspace
    - hf-cache:/root/.cache/huggingface   # persist model/dataset downloads across runs
    - torch-cache:/root/.cache/torch      # torchvision backbones (resnet18 etc.)

services:
  shell:
    <<: *smolvla
    stdin_open: true
    tty: true
    command: bash

  # Known-good baseline: pretrained ACT on AlohaTransferCube (verified ~60% success).
  verify:
    <<: *smolvla
    command:
      - bash
      - -lc
      - >
        python -m smolvla_edge.eval --mode sim
        --policy-path lerobot/act_aloha_sim_transfer_cube_human
        --env-id gym_aloha/AlohaTransferCube-v0
        --episodes ${EPISODES:-5} --max-steps 400 --task ""

  # Generic eval — pass flags via EVAL_ARGS, e.g.:
  #   EVAL_ARGS="--mode sim --policy-path lerobot/act_aloha_sim_insertion_human --episodes 10 --task ''" \
  #     docker compose run --rm eval
  eval:
    <<: *smolvla
    command:
      - bash
      - -lc
      - python -m smolvla_edge.eval ${EVAL_ARGS:---help}

  infer:
    <<: *smolvla
    command:
      - bash
      - -lc
      - >
        python -m smolvla_edge.infer --policy-path lerobot/smolvla_base
        --dataset-repo-id lerobot/svla_so101_pickplace --episodes 2

  train:
    <<: *smolvla
    command: bash scripts/train.sh

  bench:
    <<: *smolvla
    command:
      - bash
      - -lc
      - python -m smolvla_edge.bench ${BENCH_ARGS:---help}

  # --- ROS2 async deployment (openspec: ros2-cpp-async-deployment) ------------------------
  # Topology (design D1): gRPC is the only protocol crossing containers; DDS stays inside
  # the `ros2` service. sim-server/policy-server run in the py3.11 sim image (GPU); the ROS2
  # nodes run in the Jazzy overlay image (no GPU in Stage 1).

  # Existing Python gRPC policy server, unchanged (Stage 1 oracle; Stage 2 A/B baseline).
  # Default: the fine-tuned transfer-cube deliverable (70% success @ 20k steps).
  # --precision fp32 on purpose: PredictChunk's chunk predictor runs native precision
  # (server.py pins fp32); fp16 weights crash it with Float-vs-Half.
  #   POLICY_PATH=outputs/train/smolvla_aloha/checkpoints/last docker compose up policy-server
  policy-server:
    <<: *smolvla
    command:
      - bash
      - -lc
      - >
        python -u deploy/client_server/server.py
        --policy-path ${POLICY_PATH:-outputs/train/smolvla_transfer_cube/checkpoints/020000}
        --precision fp32 --port 50051 ${POLICY_SERVER_ARGS:-}

  # Stage 2b — C++ ONNX Runtime policy server (design D6), same Policy proto / port as the
  # Python server so clients run unmodified. A/B by which one you start (both bind :50051):
  #   Python:  docker compose up -d policy-server
  #   C++:     docker compose --profile cpp up -d cpp-server   (or: docker compose up -d cpp-server)
  # One-time build of the binary (cmake, inside the image):
  #   docker compose run --rm cpp-server bash -lc 'cd deploy/cpp_server && cmake -B build -DCMAKE_BUILD_TYPE=Release && cmake --build build -j'
  # Provider swap: CPP_PROVIDER=tensorrt for the TRT EP (engine cache under models/onnx/trt_cache).
  cpp-server:
    image: smolvla-edge:cpp-server
    build:
      context: .
      dockerfile: docker/cpp_server.Dockerfile
    profiles: ["cpp"]
    runtime: nvidia
    working_dir: /workspace
    stop_signal: SIGINT
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: all
    volumes:
      - ./:/workspace
    command:
      - bash
      - -lc
      - >
        deploy/cpp_server/build/policy_server
        --model ${ONNX_MODEL:-/workspace/models/onnx/smolvla_transfer_cube.onnx}
        --provider ${CPP_PROVIDER:-cuda} --port 50051

  # gym-aloha behind the SimEnv gRPC service (deploy/client_server/sim_server.py); keeps the
  # mujoco-2.3.7/py3.11 sim inside its matched container.
  sim-server:
    <<: *smolvla
    command:
      - bash
      - -lc
      - python -u deploy/client_server/sim_server.py --port 50052 ${SIM_SERVER_ARGS:-}

  # ROS2 Jazzy overlay (docker/ros2.Dockerfile, FROM ackermann_rover_x86_64_jazzy): rclpy
  # sim bridge + rclcpp async client. No nvidia runtime on purpose (spec ros2-docker-env).
  ros2:
    image: smolvla-edge:ros2
    build:
      context: .
      dockerfile: docker/ros2.Dockerfile
    working_dir: /workspace
    stdin_open: true
    tty: true
    stop_signal: SIGINT
    environment:
      PYTHONPATH: /workspace/src:/workspace/deploy/client_server
      # DDS stays inside THIS container (design D1). Without this, two concurrent
      # `compose run ros2` containers discover each other over the compose network's
      # multicast and cross-wire their topics.
      ROS_AUTOMATIC_DISCOVERY_RANGE: LOCALHOST
      ROS_LOCALHOST_ONLY: "1"
    volumes:
      - ./:/workspace
    command: bash

volumes:
  hf-cache:
  torch-cache:
