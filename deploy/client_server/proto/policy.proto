syntax = "proto3";

package smolvla_edge;

// Client/server deployment: the policy runs on the workstation (Titan X) and the Xavier NX
// is a thin control client. This mirrors how real robots offload inference. The proto carries
// a flattened observation up and an action chunk back down.

service Policy {
  // One observation in, one action (or action chunk) out.
  rpc SelectAction(Observation) returns (ActionChunk);

  // Async-inference stack (SmolVLA §3.3): one observation in, the FULL action
  // chunk out, produced by the checkpoint-aware chunk predictor (processor
  // pipeline / normalization handled server-side). The RobotClient's queue,
  // threshold g, similarity filter and aggregation all stay client-side.
  rpc PredictChunk(Observation) returns (ActionChunk);

  // Reset policy internal state (action queue, etc.) at episode boundaries.
  rpc Reset(ResetRequest) returns (ResetReply);

  // Liveness / metadata probe.
  rpc Health(HealthRequest) returns (HealthReply);
}

// A single image stream (raw bytes + shape so we avoid pinning an encoding).
message Image {
  string key = 1;          // e.g. "observation.images.top"
  bytes data = 2;          // row-major uint8 buffer (HWC) or encoded (see 'encoding')
  repeated int32 shape = 3; // [H, W, C]
  string encoding = 4;     // "raw_uint8" | "jpeg" | "png"
}

// A named float vector (proprioceptive state, etc.).
message Tensor {
  string key = 1;          // e.g. "observation.state"
  repeated float data = 2;
  repeated int32 shape = 3;
}

message Observation {
  repeated Image images = 1;
  repeated Tensor tensors = 2;
  string task = 3;         // natural-language task / instruction for the VLM
  double client_send_ts = 4; // unix seconds, for round-trip latency accounting
}

message ActionChunk {
  repeated float data = 1; // flattened [horizon, action_dim]
  repeated int32 shape = 2; // [horizon, action_dim]
  double server_recv_ts = 3;
  double server_send_ts = 4;
}

// gym-aloha behind gRPC (openspec: ros2-cpp-async-deployment, design D2). The sim is locked
// inside the py3.11 sim container (mujoco 2.3.7 match); this service is how the ROS2 container
// reaches it. Observation reuses the message above; packing follows remote.py's conventions
// (Image key "pixels.top" raw_uint8 HWC, Tensor key "agent_pos").
service SimEnv {
  // Env metadata the bridge needs before the first Reset.
  rpc Spec(SimSpecRequest) returns (SimSpecReply);

  // Start an episode; deterministic when 'seed' is set (mirrors eval.py's reset(seed=ep)).
  rpc SimReset(SimResetRequest) returns (SimResetReply);

  // Advance one control tick with one action [action_dim].
  rpc Step(SimStepRequest) returns (SimStepReply);
}

message SimSpecRequest {}
message SimSpecReply {
  string env_id = 1;      // e.g. "gym_aloha/AlohaTransferCube-v0"
  string obs_type = 2;    // e.g. "pixels_agent_pos"
  int32 action_dim = 3;   // 14 for ALOHA
  int32 max_steps = 4;    // TimeLimit the server constructed the env with
}

message SimResetRequest { optional int64 seed = 1; }
message SimResetReply {
  Observation observation = 1;
  int64 tick = 2;          // 0 after reset
}

message SimStepRequest { repeated float action = 1; }
message SimStepReply {
  Observation observation = 1;
  float reward = 2;        // gym-aloha: success == reward >= 4
  bool terminated = 3;
  bool truncated = 4;
  int64 tick = 5;
}

message ResetRequest {}
message ResetReply { bool ok = 1; }

message HealthRequest {}
message HealthReply {
  bool ok = 1;
  string device = 2;
  string precision = 3;
  string policy_path = 4;
}
